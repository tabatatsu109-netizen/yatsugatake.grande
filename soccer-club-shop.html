<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八ヶ岳グランデFC OFFICIAL SHOP</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{font-family:'Noto Sans JP',sans-serif;background:#f2f5f2;color:#111}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;font-size:inherit;outline:none}
input,select,textarea{font-family:inherit}
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(min(100%,260px),1fr));gap:16px}
.flt-wrap{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.flt-wrap::-webkit-scrollbar{display:none}
.size-wrap{display:flex;gap:5px;flex-wrap:wrap}
.cart-group{padding:12px 0;border-bottom:1px solid #f0f0f0}
.olist{display:flex;flex-direction:column;gap:8px}
.dc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.st-szs{display:flex;gap:6px;flex-wrap:wrap}
.sf-wrap{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none}
.sc-btns{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}
@media(max-width:600px){.frow{grid-template-columns:1fr!important}}
@media print{
  body>*{display:none!important}
  #inv{display:block!important;padding:32px;font-family:'Noto Sans JP',sans-serif}
  #inv table{width:100%;border-collapse:collapse}
  #inv th{background:#1a6b2f;color:#fff;padding:8px;text-align:left;font-size:13px}
  #inv td{padding:7px 8px;font-size:13px;border-bottom:1px solid #eee}
  #inv .meta td{border:1px solid #ddd;padding:5px 8px}
  #inv .meta td:first-child{background:#f0faf0;font-weight:700;width:110px}
}
</style>
</head>
<body>
<div id="app"></div>

<script>
(function(){
"use strict";

/* ───────── DATA ───────── */
var PRODS = [
  {id:1,name:"ユニフォーム（緑）",brand:"ATHLETA",desc:"公式戦の際に必要。1〜3年生はプラユニでも可。",price:8600,cat:"ユニフォーム",sizes:["130","140","150","160","S","M","L","O","XO"],reqJ:true,reqJU:true},
  {id:2,name:"ユニフォーム（白）",brand:"ATHLETA",desc:"公式戦の際に必要。1〜3年生はプラユニでも可。",price:8600,cat:"ユニフォーム",sizes:["130","140","150","160","S","M","L","O","XO"],reqJ:true,reqJU:true},
  {id:3,name:"プラクティスシャツ（白）",brand:"ATHLETA",desc:"練習時や試合前のアップ時に着用できます。",price:4800,cat:"トップス",sizes:["S","M","L","O","XO"],reqJ:true,reqJU:true},

  {id:10,name:"ポロシャツ（ネイビー）",brand:"ATHLETA",desc:"※ATHLETAではありません。カラー：ネイビー",price:3500,cat:"トップス",sizes:["S","M","L","O","XO"],reqJ:false,reqJU:true},
  {id:11,name:"プラユニ（緑）",brand:"ノーブランド",desc:"練習試合の際、ユニフォームとして着用できます。",price:4000,cat:"ユニフォーム",sizes:["130","140","150","160","S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:12,name:"プラユニ（白）",brand:"ノーブランド",desc:"練習試合の際、ユニフォームとして着用できます。",price:4000,cat:"ユニフォーム",sizes:["130","140","150","160","S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:13,name:"プラユニ（赤）",brand:"ノーブランド",desc:"練習試合・GK用。",price:4000,cat:"ユニフォーム",sizes:["130","140","150","160","S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:14,name:"プラユニ（黄）",brand:"ノーブランド",desc:"練習試合・GK用。",price:4000,cat:"ユニフォーム",sizes:["130","140","150","160","S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:15,name:"半袖プラクティスシャツ（白）",brand:"ノーブランド",desc:"練習時や着替え等に。※公式戦はATHLETAをご着用ください。",price:3200,cat:"トップス",sizes:["120","130","140","150","160","S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:16,name:"長袖プラクティスシャツ（白）",brand:"ノーブランド",desc:"練習時や着替え等に。※公式戦はATHLETAをご着用ください。",price:3500,cat:"トップス",sizes:["S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:17,name:"スウェット上下",brand:"ノーブランド",desc:"体育館練習や遠征先の部屋着等にも着用できます。",price:6500,cat:"セットアップ",sizes:["S","M","L","O","XO"],reqJ:false,reqJU:false},
  {id:18,name:"パーカー（選手用）",brand:"ノーブランド",desc:"合宿の部屋着や練習後の着替え等に着用できます。",price:4500,cat:"トップス",sizes:["S","M","L","O","XO"],reqJ:false,reqJU:false}
];

var CATS = ["すべて","ユニフォーム","トップス","ボトムス","ソックス","バッグ","セットアップ","その他"];
var TEAMS = ["ジュニア（U-12）","ジュニアユース（U-15）","スクール"];
var PAYS = ["現金払い","銀行振込","PayPay"];
var STS = ["未確認","確認済み","発注済み","入荷済み","受け渡し完了"];
var ST_COLORS = ["#F59E0B","#3B82F6","#8B5CF6","#10B981","#9CA3AF"];
var ADM_PW = "grande2024";

function fmt(n){ return "¥" + n.toLocaleString(); }
function fmtD(d){ return new Date(d).toLocaleDateString("ja-JP",{year:"numeric",month:"2-digit",day:"2-digit"}); }
function genId(){ return "ORD-" + Date.now().toString(36).toUpperCase(); }

var DEMO_ORDERS = [
  {id:"ORD-DEMO001",date:new Date(Date.now()-86400000*2).toISOString(),pName:"田中 花子",sName:"田中 翔",cat:"ジュニア（U-12）",email:"tanaka@example.com",items:[{pid:1,pname:"ユニフォーム（緑）",size:"140",qty:1,price:8600},{pid:5,pname:"ソックス（緑）",size:"22-24",qty:1,price:1800}],total:10400,pay:"現金払い",status:"未確認",note:""},
  {id:"ORD-DEMO002",date:new Date(Date.now()-86400000*5).toISOString(),pName:"鈴木 美咲",sName:"鈴木 健太",cat:"ジュニアユース（U-15）",email:"suzuki@example.com",items:[{pid:10,pname:"ポロシャツ（ネイビー）",size:"M",qty:1,price:3500},{pid:17,pname:"スウェット上下",size:"L",qty:1,price:6500}],total:10000,pay:"銀行振込",status:"確認済み",note:""}
];

var G = {g1:"#1a6b2f", g2:"#145224", g3:"#0d3b1e", gold:"#c8a94a", lt:"#f2f5f2"};

/* ───────── JSONBin CONFIG ───────── */
var JSONBIN_BIN_ID = "6a34e735da38895dfedbccd2";
var JSONBIN_MASTER_KEY = "$2a$10$xopawUKPa.2MV76.BGLZtehG8EauPnBwXLLyCgXqw/H5NfvD.yuOq";
var JSONBIN_URL = "https://api.jsonbin.io/v3/b/" + JSONBIN_BIN_ID;

function fetchOrdersFromBin(){
  return fetch(JSONBIN_URL + "/latest", {
    method: "GET",
    headers: { "X-Master-Key": JSONBIN_MASTER_KEY }
  }).then(function(res){
    if(!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }).then(function(data){
    var rec = data && data.record;
    if(rec && Array.isArray(rec.orders)) return rec.orders;
    return [];
  });
}

function saveOrdersToBin(orders){
  return fetch(JSONBIN_URL, {
    method: "PUT",
    headers: {
      "Content-Type": "application/json",
      "X-Master-Key": JSONBIN_MASTER_KEY
    },
    body: JSON.stringify({ orders: orders })
  }).then(function(res){
    if(!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  });
}

function esc(s){
  return String(s==null?"":s).replace(/[&<>"']/g, function(c){
    return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];
  });
}

/* ───────── STATE ───────── */
var S = {
  page:"shop", cat:"すべて", cart:[], cartOpen:false, step:0,
  orders: DEMO_ORDERS.map(function(o){ return Object.assign({}, o, {items:o.items.map(function(i){ return Object.assign({},i); })}); }),
  lastOrder:null,
  form:{pName:"",sName:"",cat:TEAMS[0],email:"",pay:PAYS[0],note:""},
  pwErr:"",
  adminTab:"dash", selOid:null, sfSt:"すべて",
  toast:null,
  prodSel:{},
  placing:false,
  loadingAdmin:false,
  statusUpdating:null,
  ordersLoaded:false
};

function selFor(p){
  if(!S.prodSel[p.id]) S.prodSel[p.id] = {size:p.sizes[0], qty:1, flash:false};
  return S.prodSel[p.id];
}

/* ───────── TOAST ───────── */
var toastTimer = null;
function showToast(msg){
  S.toast = {msg:msg, type:"ok"};
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ S.toast=null; render(); }, 3000);
}
function showError(msg){
  S.toast = {msg:msg, type:"error"};
  render();
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ S.toast=null; render(); }, 6000);
}

/* ───────── CART ───────── */
function addToCart(pid, size, qty){
  var p = PRODS.filter(function(x){ return x.id===pid; })[0];
  var idx = -1;
  S.cart.forEach(function(i,ii){ if(i.pid===pid && i.size===size) idx=ii; });
  if(idx>=0) S.cart[idx].qty += qty;
  else S.cart.push({pid:p.id, pname:p.name, size:size, qty:qty, price:p.price});
  var sel = selFor(p);
  sel.flash = true;
  render();
  setTimeout(function(){ sel.flash=false; render(); }, 700);
  showToast(p.name + "（" + size + "）× " + qty + " をカートに追加 ✓");
}
function cartTotal(){ return S.cart.reduce(function(s,i){ return s+i.price*i.qty; },0); }
function cartCount(){ return S.cart.reduce(function(s,i){ return s+i.qty; },0); }
function cartGrouped(){
  var acc = {};
  S.cart.forEach(function(it){
    if(!acc[it.pid]) acc[it.pid] = {pname:it.pname, items:[]};
    acc[it.pid].items.push(it);
  });
  return acc;
}
function changeCartQty(idx, delta){
  S.cart[idx].qty = Math.max(1, S.cart[idx].qty+delta);
  render();
}
function removeCartItem(idx){
  S.cart.splice(idx,1);
  render();
}

/* ───────── ORDER ───────── */
function placeOrder(){
  if(S.placing) return;
  var oid = genId();
  var order = Object.assign({}, S.form, {id:oid, date:new Date().toISOString(), items:S.cart.map(function(i){return Object.assign({},i);}), total:cartTotal(), status:"未確認"});
  var newOrders = [order].concat(S.orders);

  S.placing = true;
  render();

  saveOrdersToBin(newOrders).then(function(){
    S.orders = newOrders;
    S.lastOrder = order;
    S.cart = [];
    S.form = {pName:"",sName:"",cat:TEAMS[0],email:"",pay:PAYS[0],note:""};
    S.step = 3;
    S.placing = false;
    render();
  }).catch(function(err){
    console.error(err);
    S.placing = false;
    showError("注文の保存に失敗しました。通信環境をご確認のうえ、もう一度お試しください。");
  });
}

function printInvoice(oid){
  var o = S.orders.filter(function(x){ return x.id===oid; })[0];
  if(!o) return;
  var el = document.getElementById("inv");
  var itemRows = o.items.map(function(i){
    return "<tr><td>"+esc(i.pname)+"</td><td>"+esc(i.size)+"</td><td>"+i.qty+"点</td><td>"+fmt(i.price)+"</td><td>"+fmt(i.price*i.qty)+"</td></tr>";
  }).join("");
  el.innerHTML =
    '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;border-bottom:3px solid #1a6b2f;padding-bottom:14px">'+
      '<div><div style="font-size:20px;font-weight:900;color:#1a6b2f">⚽ 八ヶ岳グランデFC</div></div>'+
      '<div style="font-size:28px;font-weight:900;letter-spacing:4px">請 求 書</div>'+
    '</div>'+
    '<table class="meta" style="margin-bottom:20px">'+
      '<tr><td>注文ID</td><td>'+esc(o.id)+'</td></tr>'+
      '<tr><td>発行日</td><td>'+fmtD(new Date().toISOString())+'</td></tr>'+
      '<tr><td>注文日</td><td>'+fmtD(o.date)+'</td></tr>'+
      '<tr><td>保護者氏名</td><td>'+esc(o.pName)+' 様</td></tr>'+
      '<tr><td>選手氏名</td><td>'+esc(o.sName)+'（'+esc(o.cat)+'）</td></tr>'+
      '<tr><td>支払方法</td><td>'+esc(o.pay)+'</td></tr>'+
      (o.note ? '<tr><td>備考</td><td>'+esc(o.note)+'</td></tr>' : '')+
    '</table>'+
    '<table><thead><tr><th>商品名</th><th>サイズ</th><th>数量</th><th>単価</th><th>小計</th></tr></thead>'+
    '<tbody>'+itemRows+'</tbody></table>'+
    '<div style="text-align:right;font-size:18px;font-weight:900;margin-top:10px">合計金額：<span style="color:#1a6b2f;font-size:24px">'+fmt(o.total)+'</span></div>'+
    '<div style="margin-top:18px;padding:10px;background:#f5f5f5;font-size:12px;color:#555;border-radius:6px">※ お支払いは「'+esc(o.pay)+'」でお願いします。ご不明点は八ヶ岳グランデFCまでお問い合わせください。</div>';
  window.print();
}

/* ───────── ADMIN HELPERS ───────── */
function adminStatsCalc(){
  return PRODS.map(function(p){
    var sc = {};
    p.sizes.forEach(function(s){ sc[s]=0; });
    S.orders.forEach(function(o){ o.items.forEach(function(i){ if(i.pid===p.id) sc[i.size]=(sc[i.size]||0)+i.qty; }); });
    var total = Object.keys(sc).reduce(function(a,k){ return a+sc[k]; },0);
    return Object.assign({}, p, {sc:sc, total:total});
  }).filter(function(p){ return p.total>0; });
}
function totalSales(){ return S.orders.reduce(function(s,o){ return s+o.total; },0); }
function bySt(s){ return S.orders.filter(function(o){ return o.status===s; }).length; }

function downloadCsv(hdr, rows, filename){
  var csv = [hdr].concat(rows).map(function(r){
    return r.map(function(v){
      var s = String(v);
      return (s.indexOf(",")>=0 || s.indexOf('"')>=0) ? '"'+s.replace(/"/g,'""')+'"' : s;
    }).join(",");
  }).join("\n");
  var a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download = filename;
  a.click();
}
function downloadOrderListCsv(){
  var hdr=["注文ID","注文日","保護者氏名","選手氏名","チーム","メール","支払方法","合計","ステータス","備考","商品サマリー"];
  var rows = S.orders.map(function(o){
    return [o.id,fmtD(o.date),o.pName,o.sName,o.cat,o.email,o.pay,o.total,o.status,o.note||"",o.items.map(function(i){return i.pname+"("+i.size+")×"+i.qty;}).join(" / ")];
  });
  downloadCsv(hdr, rows, "注文一覧.csv");
  showToast("注文一覧CSVをダウンロードしました");
}
function downloadOrderDetailCsv(){
  var hdr=["注文ID","注文日","保護者氏名","選手氏名","チーム","メール","支払方法","ステータス","商品名","サイズ","数量","単価","小計","備考"];
  var rows=[];
  S.orders.forEach(function(o){ o.items.forEach(function(it){ rows.push([o.id,fmtD(o.date),o.pName,o.sName,o.cat,o.email,o.pay,o.status,it.pname,it.size,it.qty,it.price,it.price*it.qty,o.note||""]); }); });
  downloadCsv(hdr, rows, "注文明細.csv");
  showToast("注文明細CSVをダウンロードしました");
}

/* ───────── SMALL RENDER HELPERS ───────── */
function badge(bg,color,text){
  return '<span style="background:'+bg+';color:'+color+';font-size:9px;font-weight:700;padding:3px 7px;border-radius:3px;white-space:nowrap">'+text+'</span>';
}
function statusBadge(status){
  var i = STS.indexOf(status);
  var bg = ["#FEF3C7","#DBEAFE","#EDE9FE","#D1FAE5","#F3F4F6"][i] || "#F3F4F6";
  var col = ["#92400E","#1E40AF","#5B21B6","#065F46","#374151"][i] || "#374151";
  var dot = ST_COLORS[i] || "#9CA3AF";
  return '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:99px;font-size:11px;font-weight:700;background:'+bg+';color:'+col+';white-space:nowrap"><span style="width:5px;height:5px;border-radius:50%;background:'+dot+';display:inline-block"></span>'+esc(status)+'</span>';
}

/* ───────── PRODUCT CARD ───────── */
function productCardHtml(p){
  var sel = selFor(p);
  var icon = p.cat==="ユニフォーム"?"👕":p.cat==="ソックス"?"🧦":p.cat==="バッグ"?"🎒":p.cat==="ボトムス"?"👖":"👕";
  var badges = "";
  if(p.reqJ) badges += badge("#f4c430","#333","🟡 ジュニア必需品");
  if(p.reqJU) badges += badge("#e53935","#fff","🔴 ジュニアユース必需品");
  if(!p.reqJ && !p.reqJU) badges += badge("#888","#fff","任意");
  badges += badge(G.g3,"#fff", esc(p.brand));
  var sizesHtml = p.sizes.map(function(s){
    var active = s===sel.size;
    return '<button onclick=\'App.setProdSize('+p.id+',"'+s+'")\' style="padding:5px 9px;border-radius:6px;border:'+(active?("1.5px solid "+G.g1):"1.5px solid #ddd")+';background:'+(active?G.g1:"#fff")+';color:'+(active?"#fff":"#444")+';font-size:12px;font-weight:700">'+esc(s)+'</button>';
  }).join("");
  return (
    '<div style="background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.08)">'+
      '<div style="background:#f0f4f0;padding:20px;text-align:center;position:relative;min-height:120px;display:flex;align-items:center;justify-content:center">'+
        '<div style="font-size:40px">'+icon+'</div>'+
        '<div style="position:absolute;top:8px;left:8px;display:flex;gap:4px;flex-wrap:wrap">'+badges+'</div>'+
      '</div>'+
      '<div style="padding:14px">'+
        '<div style="font-weight:900;font-size:15px;margin-bottom:4px">'+esc(p.name)+'</div>'+
        (p.desc ? '<div style="font-size:11px;color:#888;line-height:1.5;margin-bottom:10px">'+esc(p.desc)+'</div>' : '')+
        '<div style="font-size:24px;font-weight:900;color:'+G.g1+';margin-bottom:12px">'+fmt(p.price)+'<span style="font-size:12px;color:#bbb;font-weight:400"> /点</span></div>'+
        '<div style="font-size:10px;font-weight:700;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px">SIZE</div>'+
        '<div class="size-wrap" style="margin-bottom:10px">'+sizesHtml+'</div>'+
        '<div style="display:flex;gap:8px;align-items:center">'+
          '<div style="display:flex;align-items:center;border:1.5px solid #ddd;border-radius:8px;overflow:hidden">'+

/* ───────── TOAST ───────── */
function toastHtml(){
  if(!S.toast) return "";
  var isErr = S.toast.type === "error";
  var bg = isErr ? "#b91c1c" : G.g3;
  var border = isErr ? "#e53935" : G.gold;
  var icon = isErr ? "⚠" : "✓";
  return '<div style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:'+bg+';color:#fff;padding:11px 20px;border-radius:99px;font-size:14px;font-weight:600;z-index:9999;border:1px solid '+border+';white-space:nowrap;pointer-events:none;max-width:90vw;overflow:hidden;text-overflow:ellipsis">'+icon+' '+esc(S.toast.msg)+'</div>';
}

/* ───────── MASTER RENDER ───────── */
function getPath(obj, path){
  var keys = path.split(".");
  var o = obj;
  for(var i=0;i<keys.length;i++){ o = o[keys[i]]; }
  return o;
}
function setPath(obj, path, val){
  var keys = path.split(".");
  var o = obj;
  for(var i=0;i<keys.length-1;i++){ o = o[keys[i]]; }
  o[keys[keys.length-1]] = val;
}
function bindInputs(){
  var els = document.querySelectorAll("[data-bind]");
  for(var i=0;i<els.length;i++){
    (function(el){
      var path = el.getAttribute("data-bind");
      el.value = getPath(S, path);
      var evt = el.tagName==="SELECT" ? "change" : "input";
      el.addEventListener(evt, function(e){ setPath(S, path, e.target.value); });
    })(els[i]);
  }
}
function render(){
  var html = "";
  if(S.page==="shop") html = shopPageHtml();
  else if(S.page==="login") html = loginPageHtml();
  else if(S.page==="admin") html = adminPageHtml();
  html += cartDrawerHtml();
  html += orderModalHtml();
  html += toastHtml();
  document.getElementById("app").innerHTML = html;
  bindInputs();
}

/* ───────── APP API (called from onclick attributes) ───────── */
window.App = {
  openCart: function(){ S.cartOpen = true; render(); },
  closeCart: function(){ S.cartOpen = false; render(); },
  setCat: function(c){ S.cat = c; render(); },
  setProdSize: function(pid, size){
    var p = PRODS.filter(function(x){ return x.id===pid; })[0];
    selFor(p).size = size; render();
  },
  changeProdQty: function(pid, delta){
    var p = PRODS.filter(function(x){ return x.id===pid; })[0];
    var sel = selFor(p);
    sel.qty = Math.max(1, sel.qty+delta);
    render();
  },
  addProdToCart: function(pid){
    var p = PRODS.filter(function(x){ return x.id===pid; })[0];
    var sel = selFor(p);
    addToCart(pid, sel.size, sel.qty);
  },
  changeCartQty: changeCartQty,
  removeCartItem: removeCartItem,
  goCheckout: function(){
    if(!S.cart.length) return;
    S.cartOpen = false; S.step = 1; render();
  },
  closeOrderModal: function(){ S.step = 0; render(); },
  confirmStep1: function(){
    if(!S.form.pName || !S.form.sName || !S.form.email){ showToast("必須項目を入力してください"); return; }
    S.step = 2; render();
  },
  backToStep1: function(){ S.step = 1; render(); },
  placeOrder: placeOrder,
  closeOrderDone: function(){ S.step = 0; S.page = "shop"; render(); },
  goLogin: function(){ S.page = "login"; S.pwErr = ""; render(); },
  goShop: function(){ S.page = "shop"; render(); },
  doLogin: function(){
    var val = document.getElementById("loginPw") ? document.getElementById("loginPw").value : "";
    if(val===ADM_PW){
      S.page = "admin"; S.pwErr = ""; S.adminTab = "dash";
      render();
      App.refreshOrders();
    } else {
      S.pwErr = "パスワードが正しくありません";
      render();
    }
  },
  logout: function(){ S.page = "shop"; render(); },
  setAdminTab: function(t){ S.adminTab = t; S.selOid = null; render(); },
  setSfSt: function(s){ S.sfSt = s; render(); },
  toggleOrder: function(oid){ S.selOid = (S.selOid===oid) ? null : oid; render(); },
  setOrderStatus: function(oid, status){
    if(S.statusUpdating) return;
    var updated = S.orders.map(function(o){
      return o.id===oid ? Object.assign({}, o, {status:status}) : o;
    });
    S.statusUpdating = oid;
    render();
    saveOrdersToBin(updated).then(function(){
      S.orders = updated;
      S.statusUpdating = null;
      render();
    }).catch(function(err){
      console.error(err);
      S.statusUpdating = null;
      showError("ステータスの更新に失敗しました。もう一度お試しください。");
    });
  },
  refreshOrders: function(){
    if(S.loadingAdmin) return;
    S.loadingAdmin = true;
    render();
    fetchOrdersFromBin().then(function(orders){
      S.orders = orders;
      S.ordersLoaded = true;
      S.loadingAdmin = false;
      render();
    }).catch(function(err){
      console.error(err);
      S.loadingAdmin = false;
      showError("データの読み込みに失敗しました。表示中のデータは最新でない可能性があります。");
    });
  },
  printInvoice: printInvoice,
  downloadOrderListCsv: downloadOrderListCsv,
  downloadOrderDetailCsv: downloadOrderDetailCsv,
  saveCfg: function(){ showToast("設定を保存しました（実際の保存はEmailJS設定後に実装してください）"); }
};

/* ───────── INIT ───────── */
render();

fetchOrdersFromBin().then(function(orders){
  S.orders = orders;
  S.ordersLoaded = true;
  if(S.page==="admin") render();
}).catch(function(err){
  console.error(err);
  if(S.page==="admin"){
    showError("データの読み込みに失敗しました。表示中のデータは最新でない可能性があります。");
  }
});
